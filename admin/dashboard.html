<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VisaMatch V2 — Admin</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--c-bg:#0d1117;--c-surface:#161b22;--c-border:#30363d;--c-text:#e6edf3;--c-muted:#8b949e;--c-accent:#2563eb;--c-green:#22c55e;--c-red:#ef4444;--c-yellow:#f59e0b}
  body{background:var(--c-bg);color:var(--c-text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
  /* Login */
  #login{display:flex;align-items:center;justify-content:center;min-height:100vh}
  .login-box{background:var(--c-surface);border:1px solid var(--c-border);border-radius:12px;padding:32px;width:320px;text-align:center}
  .login-box h2{margin-bottom:20px}
  .login-box input{width:100%;background:#0d1117;border:1px solid var(--c-border);border-radius:8px;padding:10px 14px;color:var(--c-text);font-size:1rem;outline:none;margin-bottom:12px}
  .btn{background:var(--c-accent);color:#fff;border:none;border-radius:8px;padding:10px 18px;font-size:.9rem;font-weight:600;cursor:pointer}
  .btn:hover{opacity:.9} .btn-sm{padding:6px 12px;font-size:.8rem}
  .btn-red{background:var(--c-red)}
  /* Layout */
  #app{display:none}
  header{background:var(--c-surface);border-bottom:1px solid var(--c-border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
  header h1{font-size:1rem;font-weight:700}
  nav{display:flex;gap:4px}
  nav button{background:none;border:1px solid transparent;border-radius:6px;padding:6px 14px;color:var(--c-muted);cursor:pointer;font-size:.85rem}
  nav button.active,nav button:hover{background:var(--c-border);color:var(--c-text);border-color:var(--c-border)}
  main{padding:24px;max-width:1100px;margin:0 auto}
  /* Stats */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
  .stat{background:var(--c-surface);border:1px solid var(--c-border);border-radius:10px;padding:16px}
  .stat .val{font-size:2rem;font-weight:700}
  .stat .lbl{color:var(--c-muted);font-size:.8rem;margin-top:2px}
  /* Table */
  .toolbar{display:flex;gap:8px;margin-bottom:12px;align-items:center}
  .toolbar input{flex:1;background:#0d1117;border:1px solid var(--c-border);border-radius:8px;padding:8px 12px;color:var(--c-text);font-size:.9rem;outline:none}
  table{width:100%;border-collapse:collapse;font-size:.85rem}
  th{text-align:left;padding:10px 12px;border-bottom:1px solid var(--c-border);color:var(--c-muted);font-weight:500}
  td{padding:10px 12px;border-bottom:1px solid #21262d;vertical-align:middle}
  tr:hover td{background:#1c2128}
  .badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:.75rem;font-weight:600}
  .badge-green{background:#1a3a25;color:var(--c-green)}
  .badge-red{background:#3a1a1a;color:var(--c-red)}
  .badge-yellow{background:#3a2e1a;color:var(--c-yellow)}
  /* Modal */
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
  .modal-bg.open{display:flex}
  .modal{background:var(--c-surface);border:1px solid var(--c-border);border-radius:12px;padding:24px;width:90%;max-width:640px;max-height:80vh;overflow-y:auto}
  .modal h3{margin-bottom:16px;font-size:1.1rem}
  .detail-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #21262d;font-size:.85rem}
  .detail-row .k{color:var(--c-muted)}
  .close-btn{float:right;background:none;border:none;color:var(--c-muted);cursor:pointer;font-size:1.2rem}
  /* Tabs */
  .tab-bar{display:flex;gap:4px;margin-bottom:16px}
  .tab-bar button{background:none;border:1px solid var(--c-border);border-radius:6px;padding:6px 14px;color:var(--c-muted);cursor:pointer;font-size:.85rem}
  .tab-bar button.active{background:var(--c-accent);color:#fff;border-color:var(--c-accent)}
  .tab-content{display:none} .tab-content.active{display:block}
</style>
</head>
<body>

<div id="login">
  <div class="login-box">
    <h2>VisaMatch V2</h2>
    <input type="password" id="pwd" placeholder="Senha admin" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn" style="width:100%" onclick="doLogin()">Entrar</button>
  </div>
</div>

<div id="app">
  <header>
    <h1>VisaMatch V2 — Admin</h1>
    <nav>
      <button class="active" onclick="showTab('leads',this)">Leads</button>
      <button onclick="showTab('hubspot',this)">HubSpot Logs</button>
    </nav>
  </header>
  <main>
    <!-- Stats -->
    <div class="stats" id="stats-row">
      <div class="stat"><div class="val" id="s-total">—</div><div class="lbl">Total leads</div></div>
      <div class="stat"><div class="val" id="s-complete">—</div><div class="lbl">Análises completas</div></div>
      <div class="stat"><div class="val" id="s-synced">—</div><div class="lbl">Sincronizados HubSpot</div></div>
    </div>

    <!-- Leads Tab -->
    <div id="tab-leads" class="tab-content active">
      <div class="toolbar">
        <input type="text" id="search" placeholder="Buscar por nome ou email..." oninput="searchLeads(this.value)">
        <button class="btn btn-sm" onclick="loadLeads()">Atualizar</button>
      </div>
      <table>
        <thead><tr><th>Nome</th><th>Email</th><th>Visto</th><th>Score</th><th>Classificação</th><th>Data</th><th></th></tr></thead>
        <tbody id="leads-tbody"></tbody>
      </table>
    </div>

    <!-- HubSpot Tab -->
    <div id="tab-hubspot" class="tab-content">
      <div id="hs-summary" style="margin-bottom:12px;font-size:.85rem;color:var(--c-muted)"></div>
      <table>
        <thead><tr><th>Nome</th><th>Email</th><th>Visto</th><th>Status</th><th>Data</th><th></th></tr></thead>
        <tbody id="hs-tbody"></tbody>
      </table>
    </div>
  </main>
</div>

<!-- Lead detail modal -->
<div class="modal-bg" id="lead-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <h3 id="modal-title">Detalhes do Lead</h3>
    <div id="modal-body"></div>
  </div>
</div>

<script>
const API = 'https://api-v2.visamatch.imigrareua.com'; // troque pelo domínio real
let _token = '';
let _leads = [];
let _searchTimer;

async function doLogin() {
  const pwd = document.getElementById('pwd').value;
  const r = await fetch(`${API}/admin/login`, {
    method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({password: pwd})
  });
  const d = await r.json();
  if (d.token) {
    _token = d.token;
    document.getElementById('login').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadAll();
  } else alert('Senha incorreta.');
}

function apiFetch(path, opts={}) {
  return fetch(API + path, { ...opts, headers: { 'Content-Type':'application/json', Authorization: `Bearer ${_token}`, ...(opts.headers||{}) } }).then(r => r.json());
}

async function loadAll() {
  loadLeads();
  loadStats();
  loadHubSpotLogs();
}

async function loadStats() {
  const d = await apiFetch('/admin/stats');
  document.getElementById('s-total').textContent = d.total ?? '—';
  document.getElementById('s-complete').textContent = d.completed ?? '—';
  document.getElementById('s-synced').textContent = d.synced ?? '—';
}

async function loadLeads(q='') {
  const d = await apiFetch('/admin/leads?limit=100' + (q ? `&q=${encodeURIComponent(q)}` : ''));
  _leads = d.leads || [];
  renderLeads(_leads);
}

function renderLeads(leads) {
  const tbody = document.getElementById('leads-tbody');
  tbody.innerHTML = '';
  leads.forEach(l => {
    const tr = document.createElement('tr');
    const labelBadge = l.label ? `<span class="badge ${l.partner==='liv'?'badge-green':'badge-yellow'}">${l.label}</span>` : '—';
    const date = l.created_at ? new Date(l.created_at).toLocaleDateString('pt-BR') : '—';
    tr.innerHTML = `<td>${l.nome||'—'}</td><td>${l.email}</td><td>${l.visto_recomendado||'—'}</td><td>${l.score??'—'}</td><td>${labelBadge}</td><td>${date}</td>
      <td><button class="btn btn-sm" onclick="showLead('${l.id}')">Ver</button></td>`;
    tbody.appendChild(tr);
  });
}

function searchLeads(q) {
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(() => loadLeads(q), 400);
}

async function loadHubSpotLogs() {
  const d = await apiFetch('/admin/hubspot-logs');
  const logs = d.logs || [];
  const summary = document.getElementById('hs-summary');
  if (logs.length === 0) {
    summary.textContent = 'Todos os leads foram sincronizados com o HubSpot.';
    summary.style.color = 'var(--c-green)';
  } else {
    summary.textContent = `${logs.length} lead(s) pendentes de sincronização.`;
    summary.style.color = 'var(--c-yellow)';
  }
  const tbody = document.getElementById('hs-tbody');
  tbody.innerHTML = '';
  logs.forEach(l => {
    const tr = document.createElement('tr');
    const status = l.hubspot_error
      ? `<span class="badge badge-red">Erro</span>`
      : `<span class="badge badge-yellow">Não enviado</span>`;
    const date = l.created_at ? new Date(l.created_at).toLocaleDateString('pt-BR') : '—';
    tr.innerHTML = `<td>${l.nome||'—'}</td><td>${l.email}</td><td>${l.visto_recomendado||'—'}</td><td>${status}${l.hubspot_error?`<br><small style="color:var(--c-muted)">${l.hubspot_error}</small>`:''}</td><td>${date}</td>
      <td><button class="btn btn-sm" onclick="retrySyncLead('${l.id}',this)">Reenviar</button></td>`;
    tbody.appendChild(tr);
  });
}

async function retrySyncLead(id, btn) {
  btn.disabled = true; btn.textContent = '...';
  const d = await apiFetch(`/admin/leads/${id}/hubspot-sync`, {method:'POST'});
  if (d.success) { loadHubSpotLogs(); loadStats(); }
  else { btn.textContent = 'Erro'; btn.disabled = false; }
}

async function showLead(id) {
  const d = await apiFetch(`/admin/leads/${id}`);
  const modal = document.getElementById('lead-modal');
  document.getElementById('modal-title').textContent = d.nome || d.email;
  const body = document.getElementById('modal-body');

  const rows = [
    ['E-mail', d.email],
    ['WhatsApp', d.phone || '—'],
    ['Visto Recomendado', d.visto_recomendado || '—'],
    ['Score', d.score ?? '—'],
    ['Classificação', d.label || '—'],
    ['HubSpot', d.hubspot_synced ? '✓ Sincronizado' : (d.hubspot_error || 'Não enviado')],
    ['Data', d.created_at ? new Date(d.created_at).toLocaleString('pt-BR') : '—'],
  ];

  let html = rows.map(([k,v]) => `<div class="detail-row"><span class="k">${k}</span><span>${v}</span></div>`).join('');

  if (d.analysis?.vistos) {
    html += `<div style="margin-top:16px;font-weight:600;margin-bottom:8px">Análise por Visto</div>`;
    d.analysis.vistos.forEach(v => {
      html += `<div class="detail-row"><span class="k">${v.visto}</span><span>Score ${v.score} — ${v.label}</span></div>`;
    });
  }

  if (d.analysis?.profile) {
    html += `<div style="margin-top:16px;font-weight:600;margin-bottom:8px">Perfil Coletado</div>`;
    Object.entries(d.analysis.profile).forEach(([k,v]) => {
      html += `<div class="detail-row"><span class="k">${k}</span><span>${v}</span></div>`;
    });
  }

  body.innerHTML = html;
  modal.classList.add('open');
}

function closeModal() {
  document.getElementById('lead-modal').classList.remove('open');
}

function showTab(tab, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  btn.classList.add('active');
}
</script>
</body>
</html>
